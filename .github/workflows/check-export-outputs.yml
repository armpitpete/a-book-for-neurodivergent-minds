name: Check export outputs

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check-export-outputs:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Check generated export outputs are not tracked
        run: python scripts/check_no_tracked_export_outputs.py
