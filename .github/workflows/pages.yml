name: Publish Website

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build proof exports
        run: python scripts/export_all_proofs.py

      - name: Build RSS feed
        run: python scripts/build_rss.py

      - name: Prepare site folder
        run: |
          mkdir -p site
          cp -R build/export/markdown-clean/. site/
          if [ -f build/export/rss.xml ]; then cp build/export/rss.xml site/rss.xml; fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
