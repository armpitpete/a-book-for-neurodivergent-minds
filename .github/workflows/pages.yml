name: Publish Website

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Build proof exports
        run: python scripts/export_all_proofs.py

      - name: Build RSS feed
        run: python scripts/build_rss.py

      - name: Prepare site folder
        run: |
          mkdir -p site
          cp -R build/export/markdown-clean/. site/
          if [ -f build/export/rss.xml ]; then cp build/export/rss.xml site/rss.xml; fi
          python - <<'PY'
          from html import escape
          from pathlib import Path
          import os

          site = Path("site")
          tag = os.environ.get("GITHUB_REF_NAME", "latest")
          release_url = f"https://github.com/armpitpete/a-book-for-neurodivergent-minds/releases/tag/{tag}"
          markdown_files = sorted(site.rglob("*.md"))

          items = []
          for file_path in markdown_files:
              rel = file_path.relative_to(site).as_posix()
              title = file_path.stem.replace("_", " ").replace("-", " ").title()
              items.append(f'<li><a href="{escape(rel)}">{escape(title)}</a></li>')

          if not items:
              items.append("<li>No Markdown exports found.</li>")

          html = f"""<!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>A Book for Neurodivergent Minds</title>
            <style>
              body {{
                font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                max-width: 760px;
                margin: 3rem auto;
                padding: 0 1rem;
                line-height: 1.55;
                color: #20262c;
              }}
              h1 {{ line-height: 1.15; }}
              .meta {{ color: #58616d; }}
              a {{ color: #2454a6; }}
              ul {{ padding-left: 1.4rem; }}
              li {{ margin: 0.35rem 0; }}
            </style>
          </head>
          <body>
            <h1>A Book for Neurodivergent Minds</h1>
            <p class="meta">Clean proof export for release {escape(tag)}.</p>

            <h2>Release</h2>
            <p><a href="{escape(release_url)}">Download the release bundle from GitHub</a>.</p>

            <h2>Feed</h2>
            <p><a href="rss.xml">RSS feed</a></p>

            <h2>Clean Markdown exports</h2>
            <ul>
              {chr(10).join(items)}
            </ul>
          </body>
          </html>
          """

          (site / "index.html").write_text(html, encoding="utf-8")
          PY

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
